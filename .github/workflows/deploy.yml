name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'

      - name: Install Flutter dependencies
        run: |
          cd src/flutter_ui
          flutter pub get

      - name: Build
        run: npm run build-ghp

      - name: Add CNAME file for custom domain
        run: echo "timofei-bazhukov.me" > build/CNAME

      - name: Configure Git user
        run: |
          git config --global user.email "bazhukov.tima@gmail.com"
          git config --global user.name "BazhukovTima"

      - name: Deploy to GitHub Pages
        run: npm run deploy
        
      - name: Confirm deployment
        run: echo "Deployed to GitHub Pages successfully!"
